{% extends "base.html" %}
{% block title %}Create Account book{% endblock %}

{% block content %}
<div class="container">
    <h2>Create new account book</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="book_name">Account book name：</label>
            <input type="text" 
                   class="form-control" 
                   id="book_name" 
                   name="book_name" 
                   placeholder="For example: personal allowance, travel fund"
                   required>
            <small class="form-text text-muted">Give your account book an easy-to-recognize name.</small>
        </div>
        
        <button type="submit" class="btn btn-primary">Create account book</button>
        <a href="{{ url_for('transactions') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
