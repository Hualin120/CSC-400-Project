{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="login2">
  <h2> Login here!</h2>

  <form method="post">
    {{ form.hidden_tag() }}

    <p>
      Enter your email or username:<br>
      {{ form.identifier() }}
    </p>

    <p>
      Enter your password:<br>
      {{ form.password() }}
    </p>

    <button type="submit">Login</button>

    <div class="mt-3">
        <a href="{{ url_for('auth.login_google') }}" class="btn btn-danger">
            <i class="fab fa-google"></i> Login with Google
        </a>
    </div>

    <div class="link-row">
      <a href="{{ url_for('forgot_password') }}">Forgot password?</a><br><br><br><a href="{{ url_for('register') }}">Don't have an account yet?</a>
    </div>
  </form>
</div>
{% endblock %}
