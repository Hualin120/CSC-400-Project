{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="login2">
  <h2>Login</h2>

  <form method="post">
    {{ form.hidden_tag() }}

    <p>
      {{ form.identifier.label }}<br>
      {{ form.identifier() }}
    </p>

    <p>
      {{ form.password.label }}<br>
      {{ form.password() }}
    </p>

    <button type="submit">Login</button>
  </form>
</div>
{% endblock %}
