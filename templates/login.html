{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="login2">
  <h2> Login here!</h2>

  <form method="post">
    {{ form.hidden_tag() }}

    <p>
      Enter your email or username:<br>
      {{ form.identifier() }}
    </p>

    <p>
      Enter your password:<br>
      {{ form.password() }}
    </p>

    <button type="submit">Login</button>
  </form>
</div>
{% endblock %}
